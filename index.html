<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#080b0f">
<title>VOID AI</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark-dimmed.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
:root{
  --bg:#080b0f;--s1:#0e1117;--s2:#161b24;--s3:#1c2333;
  --b1:rgba(255,255,255,0.07);--b2:rgba(255,255,255,0.14);
  --tx:#cdd9e5;--t2:#768390;--t3:#3d4450;
  --gr:#3fb950;--bl:#58a6ff;--cy:#39c5cf;--pu:#bc8cff;--rd:#f85149;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Outfit',sans-serif;overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh}

/* HEADER */
.hdr{padding:11px 14px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;background:rgba(8,11,15,.96);backdrop-filter:blur(16px);flex-shrink:0}
.hdr-l{display:flex;align-items:center;gap:7px}
.live{display:flex;align-items:center;gap:4px;font-size:10px;font-family:'Fira Code',monospace;color:var(--gr);background:rgba(63,185,80,.08);border:1px solid rgba(63,185,80,.2);padding:3px 8px;border-radius:5px}
.ldot{width:5px;height:5px;border-radius:50%;background:var(--gr);animation:lp 2s infinite}
@keyframes lp{0%,100%{opacity:1}50%{opacity:.3}}
.mtag{font-size:11px;font-family:'Fira Code',monospace;color:var(--t2);background:var(--s2);border:1px solid var(--b1);padding:3px 8px;border-radius:5px;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hdr-r{display:flex;gap:5px}
.hbtn{width:32px;height:32px;border-radius:8px;border:1px solid var(--b1);background:transparent;color:var(--t2);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.hbtn:active{background:var(--s2);color:var(--tx)}

/* SETTINGS PANEL */
#sp{display:none;border-bottom:1px solid var(--b1);background:var(--s1);flex-shrink:0;overflow-y:auto;max-height:55vh}
#sp.open{display:block}
.sp-inner{padding:12px 14px;display:flex;flex-direction:column;gap:10px}
.sp-row{display:flex;gap:10px;flex-wrap:wrap}
.sp-item{flex:1;min-width:130px}
.sp-item label{display:block;font-size:10px;color:var(--t2);font-family:'Fira Code',monospace;margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
.sp-item select{width:100%;padding:7px 10px;background:var(--s2);border:1px solid var(--b1);border-radius:8px;color:var(--tx);font-family:'Outfit',sans-serif;font-size:12px;outline:none}
.sp-item input[type=range]{width:100%;height:4px;background:var(--s3);border-radius:2px;outline:none;appearance:none;cursor:pointer;margin-top:4px}
.sp-item input[type=range]::-webkit-slider-thumb{appearance:none;width:14px;height:14px;border-radius:50%;background:var(--bl)}
.sp-val{color:var(--bl)}
.sp-ta{width:100%;height:72px;background:var(--s2);border:1px solid var(--b1);border-radius:8px;color:var(--tx);font-family:'Fira Code',monospace;font-size:11px;line-height:1.5;padding:8px 10px;resize:none;outline:none}
.sp-ta:focus{border-color:rgba(88,166,255,.35)}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.pbtn{padding:7px 4px;border-radius:7px;border:1px solid var(--b1);background:transparent;color:var(--t2);font-family:'Outfit',sans-serif;font-size:11px;cursor:pointer;transition:all .15s;text-align:center}
.pbtn:active{background:var(--s2)}
.pbtn.on{background:rgba(88,166,255,.12);color:var(--bl);border-color:rgba(88,166,255,.3)}
.mbtn2{padding:8px 6px;border-radius:8px;border:1px solid var(--b1);background:transparent;color:var(--t2);font-family:'Outfit',sans-serif;font-size:11px;cursor:pointer;transition:all .15s;text-align:center}
.mbtn2:active{background:var(--s2)}
.mbtn2.on{background:rgba(88,166,255,.12);color:var(--bl);border-color:rgba(88,166,255,.3)}
.tog-row{display:flex;align-items:center;justify-content:space-between;padding:2px 0}
.tog-lbl{font-size:12px;color:var(--t2)}
.tog{width:34px;height:18px;background:var(--s3);border-radius:20px;position:relative;transition:background .2s;border:1px solid var(--b1);cursor:pointer;flex-shrink:0}
.tog.on{background:var(--gr);border-color:var(--gr)}
.tog::after{content:'';position:absolute;top:2px;left:2px;width:12px;height:12px;background:#fff;border-radius:50%;transition:left .2s}
.tog.on::after{left:18px}

/* MSGS */
.msgs{flex:1;overflow-y:auto;padding:14px 0;scroll-behavior:smooth}
.msgs::-webkit-scrollbar{width:3px}
.msgs::-webkit-scrollbar-thumb{background:var(--s3)}

/* WELCOME */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:55vh;padding:20px 16px;text-align:center;gap:11px}
.w-icon{width:58px;height:58px;background:linear-gradient(135deg,#1a3a5c,#0d2137);border:1px solid rgba(88,166,255,.25);border-radius:14px;font-size:24px;display:flex;align-items:center;justify-content:center;animation:fl 5s ease-in-out infinite}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.welcome h1{font-size:22px;font-weight:800;color:#fff}
.welcome h1 span{color:var(--bl)}
.welcome p{font-size:12px;color:var(--t2);max-width:300px;line-height:1.7}
.ftag{font-size:10px;font-family:'Fira Code',monospace;color:var(--gr);background:rgba(63,185,80,.08);border:1px solid rgba(63,185,80,.2);padding:3px 9px;border-radius:20px}
.sugs{display:grid;grid-template-columns:1fr 1fr;gap:5px;width:100%;max-width:400px;margin-top:4px}
.sug{padding:9px 10px;text-align:left;background:var(--s1);border:1px solid var(--b1);border-radius:9px;color:var(--tx);font-size:11px;line-height:1.5;cursor:pointer;font-family:'Outfit',sans-serif}
.sug:active{background:var(--s2)}
.sug em{display:block;font-style:normal;font-size:9px;color:var(--t3);font-family:'Fira Code',monospace;margin-bottom:2px;text-transform:uppercase}

/* MESSAGES */
.msg{padding:4px 12px;animation:fu .2s ease}
@keyframes fu{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.mi{max-width:680px;margin:0 auto;display:flex;gap:8px}
.msg.user .mi{flex-direction:row-reverse}
.ava{width:26px;height:26px;border-radius:7px;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:12px}
.msg.user .ava{background:linear-gradient(135deg,#1a3a5c,#0d2137);border:1px solid rgba(88,166,255,.3)}
.msg.ai .ava{background:var(--s2);border:1px solid var(--b1)}
.bwrap{max-width:calc(100% - 36px)}
.bubble{padding:10px 13px;border-radius:11px;font-size:13.5px;line-height:1.8;word-break:break-word}
.msg.user .bubble{background:var(--s2);border:1px solid rgba(88,166,255,.1);border-radius:11px 3px 11px 11px}
.msg.ai .bubble{background:var(--s1);border:1px solid var(--b1);border-radius:3px 11px 11px 11px}
.bubble h1,.bubble h2,.bubble h3{font-weight:700;margin:10px 0 4px;color:#fff}
.bubble h2{font-size:14px;color:var(--bl)}.bubble h3{font-size:13px;color:var(--cy)}
.bubble p{margin:5px 0}.bubble p:first-child{margin-top:0}.bubble p:last-child{margin-bottom:0}
.bubble ul,.bubble ol{padding-left:16px;margin:4px 0}.bubble li{margin:3px 0}
.bubble strong{color:#fff;font-weight:700}.bubble em{color:var(--cy);font-style:italic}
.bubble a{color:var(--bl)}
.bubble blockquote{border-left:3px solid var(--pu);padding-left:10px;color:var(--t2);margin:6px 0;font-style:italic}
.bubble table{width:100%;border-collapse:collapse;margin:7px 0;font-size:12px}
.bubble th{background:rgba(88,166,255,.08);color:var(--bl);padding:5px 9px;text-align:left;border:1px solid var(--b1)}
.bubble td{padding:5px 9px;border:1px solid var(--b1)}
.bubble code{font-family:'Fira Code',monospace;font-size:12px;background:rgba(0,0,0,.4);padding:1px 5px;border-radius:4px;color:var(--cy)}
.bubble pre{margin:8px 0;border-radius:8px;overflow:hidden;border:1px solid var(--b1)}
.bubble pre code{background:transparent;padding:12px;display:block;overflow-x:auto;font-size:12px;line-height:1.6;color:inherit}
.ctop{display:flex;align-items:center;justify-content:space-between;padding:5px 11px;background:rgba(0,0,0,.4);border-bottom:1px solid var(--b1)}
.clang{font-family:'Fira Code',monospace;font-size:10px;color:var(--t2);text-transform:uppercase}
.ccopy{font-family:'Fira Code',monospace;font-size:10px;color:var(--t2);background:none;border:none;cursor:pointer;padding:2px 6px;border-radius:4px}
.macts{display:flex;gap:3px;margin-top:3px;opacity:0;transition:opacity .15s}
.msg:hover .macts,.msg:focus-within .macts{opacity:1}
.abtn{font-size:10px;font-family:'Fira Code',monospace;color:var(--t2);background:none;border:1px solid transparent;padding:2px 7px;border-radius:5px;cursor:pointer}
.abtn:active{color:var(--tx);border-color:var(--b2);background:var(--s2)}

/* THINKING */
.tbub{padding:10px 13px;background:var(--s1);border:1px solid var(--b1);border-radius:3px 11px 11px 11px;display:flex;align-items:center;gap:8px}
.ttext{font-size:11px;font-family:'Fira Code',monospace;color:var(--t2)}
.dots{display:flex;gap:4px}
.dots span{width:5px;height:5px;border-radius:50%;background:var(--bl);animation:db 1.4s ease-in-out infinite}
.dots span:nth-child(2){animation-delay:.15s;background:var(--cy)}
.dots span:nth-child(3){animation-delay:.3s;background:var(--pu)}
@keyframes db{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}

/* HISTORY BOTTOM SHEET */
#hsheet{position:fixed;bottom:0;left:0;right:0;background:var(--s1);border-top:1px solid var(--b1);border-radius:16px 16px 0 0;z-index:100;transform:translateY(100%);transition:transform .3s;max-height:65vh;display:flex;flex-direction:column}
#hsheet.open{transform:translateY(0)}
.hs-hdr{padding:13px 16px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hs-title{font-size:14px;font-weight:700;color:#fff}
.hs-cls{background:none;border:none;color:var(--t2);font-size:18px;cursor:pointer;line-height:1}
.hs-body{overflow-y:auto;flex:1;padding:8px}
.hi{padding:10px 12px;border-radius:9px;cursor:pointer;font-size:12px;color:var(--t2);display:flex;align-items:center;justify-content:space-between;gap:6px;transition:all .15s}
.hi:active{background:var(--s2);color:var(--tx)}
.hi.on{background:rgba(88,166,255,.1);color:var(--bl)}
.hi span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.hdel{font-size:12px;background:none;border:none;color:var(--rd);cursor:pointer;flex-shrink:0;padding:2px 6px}
.hs-ft{padding:10px 12px;border-top:1px solid var(--b1);display:flex;gap:6px;flex-shrink:0}
.hs-btn{flex:1;padding:9px;border-radius:9px;border:1px solid var(--b1);background:transparent;color:var(--tx);font-family:'Outfit',sans-serif;font-size:12px;cursor:pointer}
.hs-btn.rd{border-color:rgba(248,81,73,.3);color:var(--rd)}
#hoverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99}
#hoverlay.open{display:block}

/* INPUT */
.inp{padding:10px 13px 14px;border-top:1px solid var(--b1);background:rgba(8,11,15,.96);backdrop-filter:blur(16px);flex-shrink:0}
.ibox{max-width:680px;margin:0 auto;background:var(--s1);border:1px solid var(--b2);border-radius:13px;overflow:hidden;transition:border-color .2s,box-shadow .2s}
.ibox:focus-within{border-color:rgba(88,166,255,.4);box-shadow:0 0 0 3px rgba(88,166,255,.05)}
.irow{display:flex;align-items:flex-end;padding:10px 10px 8px;gap:7px}
#ui{flex:1;background:transparent;border:none;outline:none;color:var(--tx);font-family:'Outfit',sans-serif;font-size:14px;line-height:1.6;resize:none;max-height:140px;min-height:22px}
#ui::placeholder{color:var(--t3)}
.sbtn{width:36px;height:36px;border-radius:9px;background:var(--bl);border:none;color:#fff;cursor:pointer;font-size:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center;box-shadow:0 0 14px rgba(88,166,255,.2)}
.sbtn:active{transform:scale(.92)}
.sbtn:disabled{opacity:.35;cursor:not-allowed}
.ift{display:flex;align-items:center;justify-content:space-between;padding:4px 10px 8px}
.itools{display:flex;gap:3px}
.tbtn{width:26px;height:26px;border-radius:6px;border:none;background:transparent;color:var(--t2);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center}
.tbtn:active{background:var(--s2)}
.tbtn.on{color:var(--rd)}
.cc{font-size:10px;font-family:'Fira Code',monospace;color:var(--t3)}

/* TOAST */
.toast{position:fixed;bottom:75px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--s2);border:1px solid var(--b2);color:var(--tx);padding:7px 14px;border-radius:9px;font-size:11px;font-family:'Fira Code',monospace;opacity:0;pointer-events:none;transition:all .25s;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* MODAL */
.ovl{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.ovl.open{opacity:1;pointer-events:all}
.modal{background:var(--s1);border:1px solid var(--b2);border-radius:16px 16px 0 0;padding:20px 18px;width:100%;max-width:500px}
.modal h2{font-size:15px;margin-bottom:5px;color:#fff}
.modal p{font-size:12px;color:var(--t2);margin-bottom:14px}
.mbtns{display:flex;gap:6px}
.mbtn{flex:1;padding:10px;border-radius:9px;border:1px solid var(--b2);background:transparent;color:var(--tx);font-family:'Outfit',sans-serif;font-size:13px;cursor:pointer}
.mbtn.p{background:var(--bl);border-color:var(--bl);color:#fff}
</style>
</head>
<body>
<div class="app">

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-l">
    <div class="live"><div class="ldot"></div>FREE</div>
    <div class="mtag" id="mtag">mistral</div>
  </div>
  <div class="hdr-r">
    <button class="hbtn" onclick="toggleSP()" title="Settings">⚙</button>
    <button class="hbtn" onclick="openH()" title="History">🕐</button>
    <button class="hbtn" onclick="newChat()" title="New">✦</button>
    <button class="hbtn" onclick="openEx()" title="Export">💾</button>
  </div>
</div>

<!-- SETTINGS PANEL -->
<div id="sp">
  <div class="sp-inner">
    <!-- Model grid -->
    <div>
      <label style="display:block;font-size:10px;color:var(--t2);font-family:'Fira Code',monospace;margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em">Model</label>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(80px,1fr));gap:4px">
        <button class="mbtn2 on" data-m="mistral" onclick="setMdl('mistral')">Mistral ⭐</button>
        <button class="mbtn2" data-m="openai-large" onclick="setMdl('openai-large')">GPT-4o</button>
        <button class="mbtn2" data-m="openai" onclick="setMdl('openai')">GPT-4o Mini</button>
        <button class="mbtn2" data-m="llama" onclick="setMdl('llama')">Llama 70B</button>
        <button class="mbtn2" data-m="mistral-large" onclick="setMdl('mistral-large')">Mistral Large</button>
        <button class="mbtn2" data-m="deepseek-r1" onclick="setMdl('deepseek-r1')">DeepSeek R1</button>
        <button class="mbtn2" data-m="qwen-coder" onclick="setMdl('qwen-coder')">Qwen Coder</button>
        <button class="mbtn2" data-m="searchgpt" onclick="setMdl('searchgpt')">SearchGPT 🌐</button>
      </div>
    </div>
    <input type="hidden" id="mdl" value="mistral">
    <!-- Sliders row -->
    <div class="sp-row">
      <div class="sp-item">
        <label>Max Tokens: <span class="sp-val" id="tkv">4096</span></label>
        <input type="range" min="512" max="8192" step="512" value="4096" id="tks"
          oninput="document.getElementById('tkv').textContent=this.value">
      </div>
      <div class="sp-item">
        <label>Temperature: <span class="sp-val" id="tmpv">0.7</span></label>
        <input type="range" min="0" max="2" step="0.1" value="0.7" id="tmp"
          oninput="document.getElementById('tmpv').textContent=this.value">
      </div>
    </div>
    <!-- Persona -->
    <div>
      <label style="display:block;font-size:10px;color:var(--t2);font-family:'Fira Code',monospace;margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em">Persona</label>
      <div class="pgrid" id="pgrid">
        <button class="pbtn on" data-p="default" onclick="setPer(this)">🧠 Default</button>
        <button class="pbtn" data-p="code" onclick="setPer(this)">💻 Code</button>
        <button class="pbtn" data-p="research" onclick="setPer(this)">🔬 Research</button>
        <button class="pbtn" data-p="creative" onclick="setPer(this)">✨ Creative</button>
        <button class="pbtn" data-p="security" onclick="setPer(this)">🛡 Security</button>
        <button class="pbtn" data-p="custom" onclick="setPer(this)">⚙ Custom</button>
      </div>
    </div>
    <!-- System prompt -->
    <div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
        <label style="font-size:10px;color:var(--t2);font-family:'Fira Code',monospace;text-transform:uppercase;letter-spacing:.05em">System Prompt</label>
        <button onclick="resetSys()" style="font-size:10px;font-family:'Fira Code',monospace;color:var(--bl);background:none;border:none;cursor:pointer">reset</button>
      </div>
      <textarea class="sp-ta" id="sysp" placeholder="AI nu instruction do..."></textarea>
    </div>
    <!-- Toggles -->
    <div style="display:flex;gap:16px;flex-wrap:wrap">
      <div class="tog-row" style="gap:8px">
        <span class="tog-lbl">📥 Auto Download</span>
        <div class="tog" id="t-ad" onclick="togF('ad')"></div>
      </div>
      <div class="tog-row" style="gap:8px">
        <span class="tog-lbl">🔊 TTS</span>
        <div class="tog" id="t-tts" onclick="togF('tts')"></div>
      </div>
    </div>
  </div>
</div>

<!-- MESSAGES -->
<div class="msgs" id="msgs"></div>

<!-- INPUT -->
<div class="inp">
  <div class="ibox">
    <div class="irow">
      <textarea id="ui" placeholder="Kuch bhi puchho…" rows="1"
        onkeydown="onKey(event)" oninput="rsz(this);updCC()"></textarea>
      <button class="sbtn" id="sb" onclick="send()">➤</button>
    </div>
    <div class="ift">
      <div class="itools">
        <button class="tbtn" id="mic" onclick="toggleMic()" title="Voice">🎙</button>
      </div>
      <div class="cc" id="cc">0</div>
    </div>
  </div>
</div>
</div>

<!-- HISTORY SHEET -->
<div id="hoverlay" onclick="closeH()"></div>
<div id="hsheet">
  <div class="hs-hdr">
    <span class="hs-title">💬 Chat History</span>
    <button class="hs-cls" onclick="closeH()">✕</button>
  </div>
  <div class="hs-body" id="hbody"></div>
  <div class="hs-ft">
    <button class="hs-btn" onclick="newChat();closeH()">✦ New Chat</button>
    <button class="hs-btn rd" onclick="clearAll()">🗑 Clear All</button>
  </div>
</div>

<!-- EXPORT -->
<div class="ovl" id="exModal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2>💾 Export</h2>
    <p>Chat download karo</p>
    <div class="mbtns">
      <button class="mbtn p" onclick="doEx('txt')">📄 Text</button>
      <button class="mbtn p" onclick="doEx('md')">📝 Markdown</button>
      <button class="mbtn" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── PERSONAS ──
const P = {
  default:`You are VOID AI — a highly knowledgeable, direct, intelligent assistant. Answer all questions thoroughly and accurately. Use markdown formatting with headers, code blocks, tables where helpful. Be concise for simple questions, deeply detailed for complex ones. No unnecessary warnings.`,
  code:`You are VOID AI Code Expert. Senior software engineer. Write clean, complete, production-ready code. Always use code blocks with language tags. Explain approach briefly. Modern best practices.`,
  research:`You are VOID AI Research mode. Comprehensive, structured, multi-angle analysis. Headers, bullet points, cover theory + practical aspects. Thorough and informative.`,
  creative:`You are VOID AI Creative mode. Master writer, storyteller, poet. Vivid, original, powerful content. Push creative limits. Be literary and unexpected.`,
  security:`You are VOID AI Security mode. Expert in cybersecurity, penetration testing, malware analysis, network security, CTF. Deep technical detail for education and defense. Cover attack methodology, detection, defense strategies.`,
  custom:`You are a helpful AI assistant. Answer questions clearly and helpfully.`
};

// ── STATE ──
let hist=[], busy=false, curId=null, micRec=null, ismic=false;
const F={ad:false,tts:false};

// ── MARKED ──
marked.setOptions({breaks:true,gfm:true});
const MR=new marked.Renderer();
MR.code=(code,lang)=>{
  const l=lang||'text'; let h;
  try{h=hljs.highlight(code,{language:l,ignoreIllegals:true}).value;}
  catch{h=hljs.highlightAuto(code).value;}
  return `<pre><div class="ctop"><span class="clang">${l}</span><button class="ccopy" onclick="cpCode(this)">copy</button></div><code class="hljs">${h}</code></pre>`;
};
marked.setOptions({renderer:MR});

const rnd=t=>marked.parse(t);
const toast=(m,ms=2200)=>{const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),ms);};
function rsz(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,140)+'px';}
function updCC(){document.getElementById('cc').textContent=document.getElementById('ui').value.length;}
function scroll(){const m=document.getElementById('msgs');m.scrollTop=m.scrollHeight;}
function onKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}
function setMdl(m){
  document.getElementById('mdl').value=m;
  document.querySelectorAll('.mbtn2').forEach(b=>b.classList.remove('on'));
  document.querySelector(`.mbtn2[data-m="${m}"]`).classList.add('on');
  document.getElementById('mtag').textContent=m;
  toast('Model: '+m);
}
function syncMdl(){setMdl(document.getElementById('mdl').value);}
function getM(){return document.getElementById('mdl').value||'mistral';}
function getTk(){return parseInt(document.getElementById('tks').value)||4096;}
function getTmp(){return parseFloat(document.getElementById('tmp').value)||0.7;}
function getSys(){return document.getElementById('sysp').value||P.default;}
function toggleSP(){document.getElementById('sp').classList.toggle('open');}

function setPer(btn){
  document.querySelectorAll('.pbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('sysp').value=P[btn.dataset.p]||P.default;
  toast(btn.textContent.trim());
}
function resetSys(){
  const a=document.querySelector('.pbtn.on');
  document.getElementById('sysp').value=P[a?.dataset?.p||'default']||P.default;
}
function togF(n){
  F[n]=!F[n];
  document.getElementById('t-'+n).classList.toggle('on',F[n]);
  toast(n+': '+(F[n]?'ON':'OFF'));
}

// ── HISTORY ──
function saveChat(){
  if(!curId||!hist.length) return;
  const all=loadAll();
  all[curId]={id:curId,title:hist[0].content.slice(0,40),ts:Date.now(),hist};
  localStorage.setItem('vd2',JSON.stringify(all));
}
function loadAll(){try{return JSON.parse(localStorage.getItem('vd2')||'{}');}catch{return {};}}
function renderHL(){
  const all=loadAll(), sorted=Object.values(all).sort((a,b)=>b.ts-a.ts);
  const body=document.getElementById('hbody');
  if(!sorted.length){body.innerHTML='<div style="padding:14px;font-size:12px;color:var(--t2);text-align:center">Koi history nahi</div>';return;}
  body.innerHTML=sorted.map(c=>`<div class="hi ${c.id===curId?'on':''}" onclick="loadChat('${c.id}')"><span>${c.title||'Chat'}</span><button class="hdel" onclick="event.stopPropagation();delChat('${c.id}')">✕</button></div>`).join('');
}
function loadChat(id){
  const c=loadAll()[id]; if(!c) return;
  curId=id; hist=c.hist; renderMsgs(); renderHL(); closeH(); toast('Chat load ho gaya');
}
function delChat(id){
  const all=loadAll(); delete all[id];
  localStorage.setItem('vd2',JSON.stringify(all));
  if(curId===id) newChat(); else renderHL();
  toast('Deleted');
}
function clearAll(){
  if(!confirm('Saari history delete karni hai?')) return;
  localStorage.removeItem('vd2'); newChat(); closeH(); toast('Cleared');
}
function openH(){renderHL();document.getElementById('hsheet').classList.add('open');document.getElementById('hoverlay').classList.add('open');}
function closeH(){document.getElementById('hsheet').classList.remove('open');document.getElementById('hoverlay').classList.remove('open');}

// ── RENDER ──
function renderMsgs(){
  const c=document.getElementById('msgs');
  if(!hist.length){showWelcome();return;}
  c.innerHTML='';
  hist.forEach(m=>{
    const d=document.createElement('div');
    d.className=`msg ${m.role==='user'?'user':'ai'}`;
    d.innerHTML=`<div class="mi"><div class="ava">${m.role==='user'?'👤':'◈'}</div><div class="bwrap"><div class="bubble">${rnd(m.content)}</div><div class="macts"><button class="abtn" onclick="cpBub(this)">copy</button>${m.role==='assistant'?'<button class="abtn" onclick="regen()">↻</button>':''}</div></div></div>`;
    c.appendChild(d);
  });
  scroll();
}
function showWelcome(){
  document.getElementById('msgs').innerHTML=`<div class="welcome">
    <div class="w-icon">◈</div>
    <div class="ftag">✓ 100% FREE</div>
    <h1>VOID <span>AI</span></h1>
    <p>Kuch bhi puchho. Free, no signup, no key needed.</p>
    <div class="sugs">
      <button class="sug" onclick="fillQ(this.dataset.q)" data-q="Python mein complete REST API banao with JWT auth aur CRUD."><em>💻 Code</em>Python REST API</button>
      <button class="sug" onclick="fillQ(this.dataset.q)" data-q="Machine learning kya hai? Simple mein samjhao examples ke saath."><em>🧠 AI/ML</em>ML samjhao</button>
      <button class="sug" onclick="fillQ(this.dataset.q)" data-q="Linux ke 20 zaroori commands batao examples ke saath."><em>🖥 Linux</em>Linux commands</button>
      <button class="sug" onclick="fillQ(this.dataset.q)" data-q="Ek dark psychological horror story likho 500 words mein."><em>✨ Creative</em>Horror story</button>
    </div>
  </div>`;
}
function newChat(){curId='c_'+Date.now();hist=[];showWelcome();}
function fillQ(q){const i=document.getElementById('ui');i.value=q;rsz(i);updCC();i.focus();}

// ── MSGS ──
function addUser(t){
  const w=document.querySelector('.welcome');if(w)w.remove();
  const c=document.getElementById('msgs'),d=document.createElement('div');
  d.className='msg user';
  d.innerHTML=`<div class="mi"><div class="ava">👤</div><div class="bwrap"><div class="bubble">${rnd(t)}</div><div class="macts"><button class="abtn" onclick="cpBub(this)">copy</button></div></div></div>`;
  c.appendChild(d);scroll();
}
function addThink(){
  const w=document.querySelector('.welcome');if(w)w.remove();
  const c=document.getElementById('msgs'),d=document.createElement('div');
  d.className='msg ai';d.id='think';
  d.innerHTML=`<div class="mi"><div class="ava">◈</div><div class="tbub"><div class="dots"><span></span><span></span><span></span></div><div class="ttext">Soch raha hoon…</div></div></div>`;
  c.appendChild(d);scroll();
}
function rmThink(){const e=document.getElementById('think');if(e)e.remove();}
function addAI(t){
  rmThink();
  const c=document.getElementById('msgs'),d=document.createElement('div');
  d.className='msg ai';
  d.innerHTML=`<div class="mi"><div class="ava">◈</div><div class="bwrap"><div class="bubble">${rnd(t)}</div><div class="macts"><button class="abtn" onclick="cpBub(this)">copy</button><button class="abtn" onclick="regen()">↻</button></div></div></div>`;
  c.appendChild(d);scroll();
  if(F.ad) autoDL(t);
  if(F.tts) speak(t);
}
function autoDL(t){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([t],{type:'text/plain'}));
  a.download='reply-'+Date.now()+'.txt';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  toast('📥 Downloaded');
}

// ── API ──
function parseResp(raw){
  if(!raw||!raw.trim()) throw new Error('Empty response');
  try{
    const j=JSON.parse(raw);
    return j.choices?.[0]?.message?.content||j.choices?.[0]?.delta?.content||j.content||raw;
  }catch{}
  if(raw.includes('data: ')){
    let out='';
    raw.split('\n').forEach(line=>{
      const l=line.trim();
      if(l.startsWith('data: ')&&l!=='data: [DONE]'){
        try{const j=JSON.parse(l.slice(6));out+=j.choices?.[0]?.delta?.content||j.choices?.[0]?.message?.content||'';}
        catch{out+=l.replace('data: ','');}
      }
    });
    if(out.trim()) return out.trim();
  }
  return raw.replace(/\[reserved_\d+\]/g,'').replace(/\\n\\n/g,'\n\n').replace(/\\n/g,'\n').replace(/<\|[^|]+\|>/g,'').trim();
}

async function callAPI(){
  const r=await fetch('https://text.pollinations.ai/',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:getM(),messages:hist,system:getSys(),temperature:getTmp(),max_tokens:getTk(),stream:false})
  });
  if(!r.ok) throw new Error('Server: '+r.status);
  return parseResp(await r.text());
}

async function send(){
  const inp=document.getElementById('ui'),text=inp.value.trim();
  if(!text||busy) return;
  inp.value='';inp.style.height='auto';updCC();
  busy=true;document.getElementById('sb').disabled=true;
  addUser(text);
  hist.push({role:'user',content:text});
  addThink();
  try{
    const reply=await callAPI();
    hist.push({role:'assistant',content:reply});
    addAI(reply);saveChat();
  }catch(err){
    rmThink();
    addAI(err.message.includes('fetch')?'⚠️ **Connection Error**\n\nInternet check karo ya thodi der baad try karo.':'⚠️ **Error:** '+err.message);
  }
  busy=false;document.getElementById('sb').disabled=false;
  document.getElementById('ui').focus();
}

async function regen(){
  if(busy||hist.length<2) return;
  if(hist[hist.length-1].role==='assistant') hist.pop();
  const ais=document.querySelectorAll('.msg.ai');if(ais.length)ais[ais.length-1].remove();
  busy=true;document.getElementById('sb').disabled=true;
  addThink();
  try{const r=await callAPI();hist.push({role:'assistant',content:r});addAI(r);saveChat();}
  catch(e){rmThink();addAI('⚠️ '+e.message);}
  busy=false;document.getElementById('sb').disabled=false;
}

// ── VOICE ──
function toggleMic(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){toast('Voice support nahi');return;}
  if(ismic){micRec?.stop();return;}
  micRec=new SR();micRec.continuous=false;micRec.interimResults=true;micRec.lang='en-US';
  micRec.onstart=()=>{ismic=true;document.getElementById('mic').classList.add('on');toast('🎙 Bol…');};
  micRec.onresult=e=>{const t=Array.from(e.results).map(r=>r[0].transcript).join('');const i=document.getElementById('ui');i.value=t;rsz(i);updCC();};
  micRec.onend=()=>{ismic=false;document.getElementById('mic').classList.remove('on');};
  micRec.onerror=()=>{ismic=false;document.getElementById('mic').classList.remove('on');};
  micRec.start();
}
function speak(t){
  if(!F.tts||!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(t.replace(/[#*`_~\[\]()>]/g,'').slice(0,500));
  u.rate=0.95;window.speechSynthesis.speak(u);
}

// ── COPY ──
function cpBub(btn){navigator.clipboard.writeText(btn.closest('.bwrap').querySelector('.bubble').innerText).then(()=>toast('✓ Copied'));}
function cpCode(btn){navigator.clipboard.writeText(btn.closest('pre').querySelector('code').innerText).then(()=>{btn.textContent='copied!';setTimeout(()=>btn.textContent='copy',2000);});}

// ── EXPORT ──
function openEx(){document.getElementById('exModal').classList.add('open');}
function closeModal(){document.getElementById('exModal').classList.remove('open');}
function doEx(fmt){
  if(!hist.length){toast('Koi message nahi');return;}
  const d=new Date().toLocaleString(),m=getM();
  const out=fmt==='txt'
    ?`VOID AI Export\n${d} | ${m}\n${'─'.repeat(40)}\n\n${hist.map(x=>`[${x.role.toUpperCase()}]\n${x.content}`).join('\n\n')}`
    :`# VOID AI\n> ${d} | \`${m}\`\n\n---\n\n${hist.map(x=>`### ${x.role==='user'?'👤 You':'◈ AI'}\n\n${x.content}\n\n---`).join('\n\n')}`;
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([out],{type:'text/plain'}));
  a.download=`void-${Date.now()}.${fmt}`;a.click();
  closeModal();toast('✓ Downloaded');
}

// ── INIT ──
document.getElementById('sysp').value=P.default;
newChat();
document.getElementById('ui').focus();
</script>
